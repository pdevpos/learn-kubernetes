apiVersion: v1
kind: Pod
metadata:
  name: volume1
spec:
  containers:
    - name: nginx
      image: nginx
      volumeMounts:
#      - mountPath: /usr/share/nginx/html
#        name: nginx-path
    -  name: nginx-content
       image: pavanidevops78/kubernetes:v1

       volumeMounts:
       - name: /usr/share/nginx/html
         mountPath: nginx-path

  volumes:
  - name: nginx-path
    emptyDir: {}