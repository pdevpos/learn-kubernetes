apiVersion: v1
kind: Pod
metadata:
  name: pod-03
spec:
  containers:
    - name: nginx
      image: nginx
      volumeMounts:
        - name: nginx-path
          mountPath: /usr/share/nginx/html/index.html
    - name: nginx-content
      image: rkalluru/d78-nginx:v1
      volumeMounts:
        - name: nginx-path
          mountPath: /usr/share/nginx/html/index.html
  volumes:
    - name: nginx-path
      emptyDir: {}